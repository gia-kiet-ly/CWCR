name: Deploy to Azure (Production)

on:
  push:
    branches: ["master"]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: cwcr-api
  DOTNET_VERSION: "9.0.x"
  API_PROJECT: "API/API.csproj"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - run: dotnet restore "${{ env.API_PROJECT }}"
      
      - run: dotnet build "${{ env.API_PROJECT }}" -c Release --no-restore
      
      - run: dotnet publish "${{ env.API_PROJECT }}" -c Release -o publish --no-build
      
      - uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: publish