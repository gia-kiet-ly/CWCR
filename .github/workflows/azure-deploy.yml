name: Build & Deploy API to Azure (mainfake)

on:
  push:
    branches: ["mainfake"]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: cwcr-api
  DOTNET_VERSION: "9.0"
  API_PROJECT: "API.csproj"   # <-- sửa đúng tên .csproj của bạn

jobs:
  build-and-deploy:
    runs-on: windows-latetst

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore "${{ env.API_PROJECT }}"

      - name: Build
        run: dotnet build "${{ env.API_PROJECT }}" -c Release --no-restore

      - name: Publish
        run: dotnet publish "${{ env.API_PROJECT }}" -c Release -o publish --no-build

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: publish